<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            margin: 1rem 0;
        }

        .info {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.9rem;
            margin-top: 1.5rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Hello World!</h1>
        <p class="subtitle">Welcome to the HTML Hello World Page</p>
        
        <section class="card">
            <div class="info">
                <p>This is a simple HTML5 page created as part of the Paperclip project management workflow.</p>
                <p><strong>Issue:</strong> LIO-19 - Development: Implement HTML Hello World Page</p>
                <p><strong>Repository:</strong> paperclip-test</p>
            </div>
            
            <div class="badge">✅ HTML5 Compliant</div>
        </section>
    </main>
</body>
</html>
