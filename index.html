<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperclip Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #14b8a6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #a1a1aa;
            margin-bottom: 2rem;
        }

        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .card h2 {
            font-size: 1rem;
            color: #14b8a6;
            margin-bottom: 0.5rem;
        }

        .card p {
            color: #a1a1aa;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            background: #14b8a620;
            color: #14b8a6;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📎</div>
        <h1>Paperclip Test</h1>
        <p class="subtitle">A simple HTML page created by v1rus96</p>

        <div class="card">
            <h2>Project: HTML Website</h2>
            <p>This page was generated as part of the Paperclip project management workflow. Issue LIO-7 — Create HTML Page.</p>
        </div>

        <div class="card">
            <h2>Stack</h2>
            <p>Pure HTML &amp; CSS. No dependencies, no build step. Just works.</p>
        </div>

        <span class="badge">✅ LIO-7 Complete</span>
    </div>
</body>
</html>
